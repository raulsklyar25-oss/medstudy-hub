server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect all HTTP requests to HTTPS (once SSL is installed)
    # return 301 https://$host$request_uri;

    # Frontend Static Files
    location / {
        root /var/www/medstudy-hub/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API requests proxying
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Socket.io requests proxying (WebSockets)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # User uploads directory
    location /uploads {
        alias /var/www/medstudy-hub/backend/uploads;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # PDF Books local directory cache configuration
    location /frontend/assets/books {
        alias /var/www/medstudy-hub/frontend/assets/books;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        # Allow cross-origin frame requests
        add_header Access-Control-Allow-Origin *;
    }
}
